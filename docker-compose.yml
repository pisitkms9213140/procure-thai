services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: procure_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - procure_net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: procure_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - procure_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: procure_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: procure_central
      MYSQL_USER: procure
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - procure_db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - procure_net

  node:
    image: node:20-alpine
    container_name: procure_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - procure_net
    profiles:
      - dev
    command: sh -c "npm install && npm run dev"

networks:
  procure_net:
    driver: bridge

volumes:
  procure_db_data:
