# ============================================================
# Nginx config for ProcureThai
# Place in: /etc/nginx/sites-available/procurethai
# Enable:   ln -s /etc/nginx/sites-available/procurethai /etc/nginx/sites-enabled/
# ============================================================

# Central domain (procurethai.uk)
server {
    listen 80;
    server_name procurethai.uk www.procurethai.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name procurethai.uk www.procurethai.uk;

    root /var/www/procure-thai/public;
    index index.php;

    # SSL — use your own cert paths (e.g. Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/procurethai.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/procurethai.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 50M;
}

# Wildcard subdomain (*.procurethai.uk) — tenant apps
server {
    listen 80;
    server_name *.procurethai.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.procurethai.uk;

    root /var/www/procure-thai/public;
    index index.php;

    # Wildcard SSL cert (*.procurethai.uk)
    ssl_certificate     /etc/letsencrypt/live/procurethai.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/procurethai.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 50M;
}
